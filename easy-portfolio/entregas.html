<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Processos - Entregas</title>
    <link rel="stylesheet" href="style.css">
    <!-- Adiciona a biblioteca de ícones Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <img src="imagens/logo.png" alt="Logo do Site" class="site-logo">
        <h1>Controle de Processos</h1>
        <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menu">
            <span class="menu-toggle-bar"></span>
            <span class="menu-toggle-bar"></span>
            <span class="menu-toggle-bar"></span>
        </button>
    </header>

    <!-- Menu Dropdown -->
    <nav id="main-menu" class="main-menu">
        <ul>
            <li class="user-info-menu">
                <a href="#" id="edit-profile-btn">
                    <i class="fas fa-user-circle"></i>
                    <div class="user-details">
                        <span id="user-display-name">Carregando...</span>
                        <small id="user-display-role"></small>
                    </div>
                </a>
            </li>
            <li><a href="index.html">Home <i class="fas fa-home"></i></a></li>
            <li class="menu-item-separator"><a href="#">Suporte <i class="fas fa-headset"></i></a></li>
            <li><a href="#">Configuração <i class="fas fa-cog"></i></a></li>
            <li class="menu-item-separator"><a href="#" id="logout-btn">Sair <i class="fas fa-sign-out-alt"></i></a></li>
        </ul>
    </nav>

    <img src="imagens/logo (2).png" alt="Logo Secundário" class="site-logo-bottom">

    <div class="container">
        <div class="tabs">
            <a href="index.html" class="tab-button" data-tab="home">Home</a>
            <a href="producao.html" class="tab-button" data-tab="producao">Produção</a>
            <a href="expedicao.html" class="tab-button" data-tab="expedicao">Expedição</a>
            <a href="entregas.html" class="tab-button active" data-tab="entregas">Entregas</a>
        </div>

        <div class="tab-content-container">

            <!-- Aba Entregas -->
            <div id="entregas" class="tab-content entregas-colors">
                <div class="tab-header">
                    <h2>Etapa de Entregas</h2>
                    <div class="header-actions">
                        <div id="search-controls" class="search-controls">
                            <select id="sort-by" class="header-select">
                                <option value="date_desc">Ordenar por: Mais Recente</option>
                                <option value="date_asc">Ordenar por: Mais Antigo</option>
                                <option value="nf_asc">Ordenar por: NF (A-Z)</option>
                            </select>
                            <select id="filter-by" class="header-select">
                                <option value="nf">Buscar por NF</option>
                                <option value="data">Buscar por Data</option>
                                <option value="transportadora">Buscar por Transportadora</option>
                                <option value="destino">Buscar por Destino</option>
                            </select>
                            <input type="search" id="search-input" class="search-input" placeholder="Digite para buscar...">
                            <input type="date" id="date-input" class="date-input" style="display: none;">
                        </div>
                        <button id="search-toggle-btn" class="icon-btn" aria-label="Buscar"><i class="fas fa-search"></i></button>
                        <button class="add-post-btn">Adicionar Novo Post</button>
                    </div>
                </div>
                <div class="post-grid">
                    <!-- Posts de Entregas serão adicionados aqui -->
                </div>
            </div>

        </div>
    </div>

    <!-- Modal para Adicionar Post -->
    <div id="post-form-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3>Adicionar Novo Post</h3>

            <label for="post-nf">NF:</label>
            <input type="text" id="post-nf" placeholder="Número da Nota Fiscal">

            <label for="post-data">DATA:</label>
            <input type="date" id="post-data">

            <div id="field-group-produtor" class="form-field-group">
                <label for="post-produtor">PRODUTOR:</label>
                <input type="text" id="post-produtor" placeholder="Nome do produtor">
            </div>
            <div id="field-group-conferente" class="form-field-group">
                <label for="post-conferente">CONFERENTE:</label>
                <input type="text" id="post-conferente" placeholder="Nome do conferente">
            </div>
            <div id="field-group-transportadora" class="form-field-group">
                <label for="post-transportadora">TRANSPORTADORA:</label>
                <input type="text" id="post-transportadora" placeholder="Nome da transportadora">
            </div>
            <div id="field-group-destino" class="form-field-group">
                <label for="post-destino">DESTINO:</label>
                <input type="text" id="post-destino" placeholder="Cidade de destino">
            </div>

            <label for="post-image">Imagens (Opcional):</label>
            <div id="drop-zone" class="drop-zone">
                <span id="drop-zone-prompt" class="drop-zone-prompt">Arraste uma imagem aqui ou clique para selecionar (até 50)</span>
            </div>
            <input type="file" id="post-image" accept="image/*" multiple style="display: none;">
            <div id="image-preview-container" class="image-preview-container">
                <!-- Image previews will be added here -->
            </div>

            <label for="post-observacao">Observação:</label>
            <textarea id="post-observacao" placeholder="Escreva uma observação..."></textarea>

            <button id="submit-post-btn">Postar</button>
        </div>
    </div>

    <!-- Modal para Escolha da Fonte da Imagem -->
    <div id="image-source-modal" class="modal">
        <div class="modal-content image-source-content">
            <span class="close-btn" id="close-source-modal">&times;</span>
            <h3>Escolha a fonte da imagem</h3>
            <div class="source-options">
                <label for="post-image" id="source-files-btn" class="source-option-btn">
                    <i class="fas fa-folder-open"></i>
                    <span>Arquivos</span>
                </label>
                <label for="post-image" id="source-camera-btn" class="source-option-btn" aria-label="Abrir Câmera">
                    <i class="fas fa-camera"></i>
                    <span>Câmera</span>
                </label>
            </div>
        </div>
    </div>

    <!-- Modal para Zoom da Imagem -->
    <div id="image-zoom-modal" class="modal">
        <div class="modal-content zoom-content">
            <span class="close-btn zoom-close-btn">&times;</span>
            <img id="zoomed-image" src="" alt="Imagem Ampliada">
        </div>
    </div>

    <!-- Modal para Editar Perfil -->
    <div id="edit-profile-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-profile-modal">&times;</span>
            <h3>Meus Dados</h3>
            <form id="edit-profile-form">
                <label for="profile-email">Email:</label>
                <input type="email" id="profile-email" disabled>

                <label for="profile-nome">Nome:</label>
                <input type="text" id="profile-nome" required>

                <label for="profile-sobrenome">Sobrenome:</label>
                <input type="text" id="profile-sobrenome" required>

                <label for="profile-contato">Número para Contato:</label>
                <input type="tel" id="profile-contato" required placeholder="(XX) XXXXX-XXXX">

                <div class="password-change-section">
                    <h4>Alterar Senha (opcional)</h4>
                    <label for="profile-new-password">Nova Senha:</label>
                    <input type="password" id="profile-new-password" placeholder="Deixe em branco para não alterar">

                    <label for="profile-confirm-password">Confirmar Nova Senha:</label>
                    <input type="password" id="profile-confirm-password">
                </div>
                
                <button type="submit" id="save-profile-btn">Salvar Alterações</button>
                <p id="profile-success" class="profile-success-message"></p>
                <p id="profile-error" class="profile-error-message"></p>
            </form>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
