<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - Easy Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <header>
            <h1>Painel de Controle</h1>
            <a href="index.html">Voltar para a Página Inicial</a>
        </header>
        <section class="content-box">
            <h2>Editar Texto da Página Inicial</h2>
            <textarea id="editor-texto" rows="10" placeholder="Digite seu texto de apresentação aqui..."></textarea>
            <button id="salvar-btn" class="action-button">Salvar Texto</button>
            <p id="mensagem-confirmacao" class="confirm-message"></p>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
