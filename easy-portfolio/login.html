<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Controle de Processos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-wrapper">
        <div id="login-container" class="login-container">
            <img src="imagens/logo.png" alt="Logo" class="login-logo">
            <h2>Controle de Processos</h2>
            <form id="login-form">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="seu.email@exemplo.com">
                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" required>
                <button type="submit">Entrar</button>
                <p id="login-error" class="login-error"></p>
            </form>
            <a href="#" id="show-register-link" class="toggle-link">Não tem uma conta? Crie uma aqui.</a>
        </div>

        <div id="register-container" class="login-container" style="display: none;">
            <img src="imagens/logo.png" alt="Logo" class="login-logo">
            <h2>Criar Conta</h2>
            <form id="register-form">
                <label for="register-email">Email:</label>
                <input type="email" id="register-email" name="email" required>

                <label for="register-nome">Nome:</label>
                <input type="text" id="register-nome" name="nome" required>

                <label for="register-sobrenome">Sobrenome:</label>
                <input type="text" id="register-sobrenome" name="sobrenome" required>

                <label for="register-contato">Número para Contato:</label>
                <input type="tel" id="register-contato" name="contato" required placeholder="(XX) XXXXX-XXXX">
                
                <label for="register-password">Senha:</label>
                <input type="password" id="register-password" name="password" required>

                <label for="confirm-password">Confirmar Senha:</label>
                <input type="password" id="confirm-password" name="confirm-password" required>

                <label for="register-role">Tipo de Conta:</label>
                <select id="register-role" name="role">
                    <option value="producao">Produção</option>
                    <option value="transportadora">Transportadora</option>
                </select>
                
                <button type="submit">Criar</button>
                <p id="register-error" class="login-error"></p>
            </form>
            <a href="#" id="show-login-link" class="toggle-link">Já tem uma conta? Faça o login.</a>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
