<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Usuários - Controle de Processos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <a href="index.html"><img src="imagens/logo.png" alt="Logo do Site" class="site-logo"></a>
        <h1>Gerenciamento de Usuários</h1>
        <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menu">
            <span class="menu-toggle-bar"></span>
            <span class="menu-toggle-bar"></span>
            <span class="menu-toggle-bar"></span>
        </button>
    </header>

    <!-- Menu Dropdown -->
    <nav id="main-menu" class="main-menu">
        <ul>
            <li class="user-info-menu">
                <a href="#" id="edit-profile-btn">
                    <div class="user-details">
                        <span id="user-display-name">Carregando...</span>
                        <small id="user-display-role"></small>
                    </div>
                    <i class="fas fa-user-circle"></i>
                </a>
            </li>
            <li><a href="index.html">Home <i class="fas fa-home"></i></a></li>
            <li class="menu-item-separator"></li>
            <li><a href="suporte.html">Suporte <i class="fas fa-headset"></i></a></li>
            <li><a href="user-management.html">Configuração <i class="fas fa-cog"></i></a></li>
            <li class="menu-item-separator"></li>
            <li><a href="#" id="logout-btn">Sair <i class="fas fa-sign-out-alt"></i></a></li>
        </ul>
    </nav>

    <img src="imagens/logo (2).png" alt="Logo Secundário" class="site-logo-bottom">

    <div class="container">
        <div class="user-management-container">
            <table class="user-management-table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Perfil</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="user-list-body">
                    <!-- Linhas de usuário serão inseridas aqui via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal para Editar Perfil de Usuário (pelo ADM) -->
    <div id="edit-user-role-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-user-role-modal">&times;</span>
            <h3>Editar Perfil do Usuário</h3>
            <form id="edit-user-role-form">
                <p><strong>Usuário:</strong> <span id="editing-user-email"></span></p>
                <label for="user-role-select">Perfil:</label>
                <select id="user-role-select">
                    <option value="adm">Administrador</option>
                    <option value="producao">Produção</option>
                    <option value="transportadora">Transportadora</option>
                </select>
                <button type="submit" id="save-user-role-btn">Salvar Perfil</button>
            </form>
        </div>
    </div>

    <!-- Modal para Editar Perfil do próprio usuário (necessário para script.js) -->
    <div id="edit-profile-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-profile-modal">&times;</span>
            <h3>Meus Dados</h3>
            <form id="edit-profile-form">
                <!-- Conteúdo do formulário de perfil do usuário -->
            </form>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="gerenciar-usuarios.js"></script>
    <!-- Inclui o script.js para funcionalidades compartilhadas como o menu -->
    <script src="script.js"></script>
</body>
</html>
