<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon em formato SVG para alta qualidade e personalização de cor -->
    <link rel="icon" href="data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23d3fc00' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpath d='M13 2L3 14h9l-1 8 10-12h-9l1-8z'/%3e%3c/svg%3e">
    <title>Suporte - Sirius</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome CDN com atributos de segurança (SRI) para garantir a integridade do arquivo -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        /* Classe de acessibilidade para esconder elementos visualmente, mas mantê-los para leitores de tela. */
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* --- Estilos para Uniformidade e Beleza do Painel do Menu --- */

        /* Base para todos os links do menu, garantindo layout uniforme */
        .main-menu ul li a {
            display: flex;
            justify-content: space-between; /* Alinha texto à esquerda e ícone à direita */
            align-items: center;
            padding: 13px 20px; /* Aumenta o padding vertical para mais respiro */
            color: #f0f0f0;
            text-decoration: none;
            border-left: 4px solid transparent; /* Borda um pouco mais espessa para destaque */
            transition: background-color 0.2s, color 0.2s, padding-left 0.2s, border-left-color 0.2s;
        }

        /* Efeito de hover padrão para todos os itens */
        .main-menu ul li a:hover {
            background-color: #333;
            color: #d3fc00;
            padding-left: 16px; /* Ajusta o padding para o texto não pular */
            border-left-color: #d3fc00;
        }

        /* Garante que o ícone e o texto do usuário também mudem de cor no hover */
        .main-menu ul li a:hover i,
        .main-menu ul li a:hover .user-details span,
        .main-menu ul li a:hover .user-details small {
            color: #d3fc00;
        }

        /* Transição suave de cor para os ícones e texto do usuário */
        .main-menu i,
        .main-menu .user-details span,
        .main-menu .user-details small {
            transition: color 0.2s;
        }

        /* Estilo de hover específico para o botão Sair */
        .main-menu ul li a#logout-btn:hover,
        .main-menu ul li a#logout-btn:hover i {
            color: #ff2828; /* Vermelho para indicar uma ação final */
            border-left-color: #ff2828;
        }

        /* Estilo para os separadores */
        .main-menu .menu-item-separator {
            border-top: 1px solid #444;
            margin: 8px 20px; /* Espaçamento vertical e horizontal */
            list-style: none;
        }
    </style>
</head>
<body>

    <header class="main-header">
        <a href="index.html" class="logo-link">
            <img src="imagens/logo.png" alt="Logo Sirius" class="site-logo">
            <img src="imagens/logo-cell.png" alt="Logo Sirius para Celular" class="site-logo-cell">
        </a>
        <h1>Controle de Processos</h1>
        <!-- O atributo aria-label pode ser atualizado via JS para "Fechar menu" quando ativo -->
        <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menu" aria-expanded="false" aria-controls="main-menu">
            <span class="menu-toggle-bar"></span>
            <span class="menu-toggle-bar"></span>
            <span class="menu-toggle-bar"></span>
        </button>
    </header>

    <!-- Menu Dropdown -->
    <nav id="main-menu" class="main-menu">
        <ul>
            <li class="user-info-menu">
                <a href="#" id="profile-btn">
                    <div class="user-details">
                        <span id="user-display-name">Carregando...</span>
                        <small id="user-display-role"></small>
                    </div>
                    <i class="fas fa-user-circle"></i>
                </a>
            </li>
            <li><a href="index.html">Home <i class="fas fa-home"></i></a></li>
            <li class="menu-item-separator"></li>
            <li><a href="suporte.html">Suporte <i class="fas fa-headset"></i></a></li>
            <li><a href="user-management.html">Configuração <i class="fas fa-cog"></i></a></li>
            <li class="menu-item-separator"></li>
            <li><a href="#" id="logout-btn">Sair <i class="fas fa-sign-out-alt"></i></a></li>
        </ul>
    </nav>

    <main>
        <div class="container">
            <div class="page-header">
                <h1>Página de Suporte</h1>
            </div>
            <div class="support-content">
                <p>Se precisar de ajuda, entre em contato conosco através do email: <a href="mailto:suporte@sirius.com">suporte@sirius.com</a></p>
                <!-- Mais conteúdo de suporte pode ser adicionado aqui -->
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <img src="imagens/logo (2).png" alt="Logo Sirius - Rodapé" class="site-logo-bottom">
    </footer>

    <!-- Modais Padrão (incluídos para consistência, mesmo que não sejam usados diretamente nesta página) -->
    <div id="edit-profile-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="profile-modal-title">
        <div class="modal-content">
            <button type="button" class="close-btn" id="close-profile-modal" aria-label="Fechar modal">&times;</button>
            <h3 id="profile-modal-title">Meus Dados</h3>
            <form id="edit-profile-form" novalidate>
                <label for="profile-email">Email:</label>
                <input type="email" id="profile-email" disabled>

                <label for="profile-nome">Nome:</label>
                <input type="text" id="profile-nome" required autocomplete="given-name">

                <label for="profile-sobrenome">Sobrenome:</label>
                <input type="text" id="profile-sobrenome" required autocomplete="family-name">

                <label for="profile-contato">Número para Contato:</label>
                <input type="tel" id="profile-contato" required placeholder="(XX) XXXXX-XXXX" autocomplete="tel">

                <fieldset class="password-change-section">
                    <legend>Alterar Senha (opcional)</legend>
                    <label for="profile-new-password">Nova Senha:</label>
                    <input type="password" id="profile-new-password" placeholder="Deixe em branco para não alterar" autocomplete="new-password">

                    <label for="profile-confirm-password">Confirmar Nova Senha:</label>
                    <input type="password" id="profile-confirm-password" autocomplete="new-password">
                </fieldset>
                
                <button type="submit" id="save-profile-btn">Salvar Alterações</button>
                <p id="profile-success" class="profile-success-message" aria-live="polite"></p>
                <p id="profile-error" class="profile-error-message" aria-live="polite"></p>
            </form>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
