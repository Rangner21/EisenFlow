<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Controle de Processos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <a href="index.html"><img src="imagens/logo.png" alt="Logo do Site" class="site-logo"></a>
        <h1>Dashboard do Administrador</h1>
        <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menu">
            <span class="menu-toggle-bar"></span>
            <span class="menu-toggle-bar"></span>
            <span class="menu-toggle-bar"></span>
        </button>
    </header>

    <!-- Menu Dropdown (igual às outras páginas) -->
    <nav id="main-menu" class="main-menu">
        <ul>
            <li class="user-info-menu">
                <a href="#" id="edit-profile-btn">
                    <div class="user-details">
                        <span id="user-display-name">Carregando...</span>
                        <small id="user-display-role"></small>
                    </div>
                    <i class="fas fa-user-circle"></i>
                </a>
            </li>
            <li><a href="index.html">Home <i class="fas fa-home"></i></a></li>
            <li class="menu-item-separator"></li>
            <li><a href="suporte.html">Suporte <i class="fas fa-headset"></i></a></li>
            <li><a href="user-management.html">Configuração <i class="fas fa-cog"></i></a></li>
            <li class="menu-item-separator"></li>
            <li><a href="#" id="logout-btn">Sair <i class="fas fa-sign-out-alt"></i></a></li>
        </ul>
    </nav>

    <img src="imagens/logo (2).png" alt="Logo Secundário" class="site-logo-bottom">

    <div class="container">
        <div class="dashboard-filters">
            <div class="filter-group">
                <label for="date-start">Data de Início:</label>
                <input type="date" id="date-start" class="dashboard-date-input">
            </div>
            <div class="filter-group">
                <label for="date-end">Data de Fim:</label>
                <input type="date" id="date-end" class="dashboard-date-input">
            </div>
        </div>
        <div class="dashboard-grid">
            <!-- Cards de Estatísticas -->
            <div class="stat-card">
                <h3>Total de Posts</h3>
                <p id="total-posts-stat">0</p>
            </div>
            <div class="stat-card">
                <h3>Posts em Produção</h3>
                <p id="producao-posts-stat">0</p>
            </div>
            <div class="stat-card">
                <h3>Posts em Expedição</h3>
                <p id="expedicao-posts-stat">0</p>
            </div>
            <div class="stat-card">
                <h3>Posts em Entregas</h3>
                <p id="entregas-posts-stat">0</p>
            </div>

            <!-- Gráfico de Atividade -->
            <div class="stat-card chart-card">
                <h3>Atividade de Posts (Últimos 30 dias)</h3>
                <div class="chart-container">
                    <canvas id="posts-chart"></canvas>
                </div>
            </div>

            <!-- Posts por Usuário -->
            <div class="stat-card user-list-card">
                <h3>Posts por Usuário</h3>
                <ul id="user-posts-list" class="user-stats-list">
                    <!-- Lista será preenchida via JS -->
                </ul>
            </div>
        </div>
    </div>

    <!-- Modal de Edição de Perfil (necessário para o script.js) -->
    <div id="edit-profile-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-profile-modal">&times;</span>
            <h3>Meus Dados</h3>
            <form id="edit-profile-form">
                <label for="profile-email">Email:</label>
                <input type="email" id="profile-email" disabled>
                <label for="profile-nome">Nome:</label>
                <input type="text" id="profile-nome" required>
                <label for="profile-sobrenome">Sobrenome:</label>
                <input type="text" id="profile-sobrenome" required>
                <label for="profile-contato">Número para Contato:</label>
                <input type="tel" id="profile-contato" required placeholder="(XX) XXXXX-XXXX">
                <div class="password-change-section">
                    <h4>Alterar Senha (opcional)</h4>
                    <label for="profile-new-password">Nova Senha:</label>
                    <input type="password" id="profile-new-password" placeholder="Deixe em branco para não alterar">
                    <label for="profile-confirm-password">Confirmar Nova Senha:</label>
                    <input type="password" id="profile-confirm-password">
                </div>
                <button type="submit" id="save-profile-btn">Salvar Alterações</button>
                <p id="profile-success" class="profile-success-message"></p>
                <p id="profile-error" class="profile-error-message"></p>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="auth.js"></script>
    <script src="dashboard.js"></script>
    <!-- Inclui o script.js para funcionalidades compartilhadas como o menu -->
    <script src="script.js"></script>
</body>
</html>
